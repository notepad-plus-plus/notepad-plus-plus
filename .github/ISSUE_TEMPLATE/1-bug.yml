name: Bug
description: File a bug/issue
title: "[BUG] <title>"
#labels: ["bug"]
#type: bug
body:
- type: checkboxes
  attributes:
    label: Is there an existing issue for this?
    description: |
      Please search to see if an issue already exists for the bug you encountered.
      If the issue is for a plugin (except for mimeTools, NppConverter, and NppExport),
      report it to the plugin author rather than here.
    options:
    - label: I have searched the existing issues
      required: true
- type: checkboxes
  attributes:
    label: Is the issue reproducible in npminmin without plugin?
    description: |
      If feasible, try launching npminmin without any plugins.
      Some updates to npminmin modify communication rules used by plugins,
      and if plugin developers do not keep their plugins in sync with these changes, issues may arise.
      Running without plugins can help diagnose specific problems.
      You can use cmdline `npminmin.exe -noPlugin`
      or rename your plugin folder, usually "C:\Program Files\npminmin\plugins\" to e.g. "...\plugins.bak\").
    options:
    - label: I have tried npminmin without plugin
      required: false
- type: checkboxes
  attributes:
    label: Is the issue reproducible in portable version of npminmin?
    description: |
      If feasible, try launching portable version of npminmin.
      It can help to diagnose if specific configuration is causing issue.
    options:
    - label: I have tried portable version of npminmin
      required: false
- type: checkboxes
  attributes:
    label: Does the issue affect SciTE?
    description: |
      npminmin relies on the Lexilla and Scintilla libraries.
      For more details, visit https://github.com/ScintillaOrg/lexilla and https://sourceforge.net/p/scintilla.
      Consider using the reference program SciTE to verify whether the issue is a genuine bug in npminmin.
      Download Scite from here https://www.scintilla.org/SciTEDownload.html.
    options:
    - label: I have tried SciTE
      required: false
- type: textarea
  attributes:
    label: Description of the Issue
    description: Provide a concise description to the issue itself.
  validations:
    required: true
- type: textarea
  attributes:
    label: Steps To Reproduce
    description: Steps to reproduce the behavior.
    placeholder: |
      1.  
      2.  
      3.  
      ...
    value: |
      1.  
      2.  
      3.  
  validations:
    required: true
- type: textarea
  attributes:
    label: Current Behavior
    description: What you're experiencing.
  validations:
    required: true
- type: textarea
  attributes:
    label: Expected Behavior
    description: What did you expect to happen.
  validations:
    required: true
- type: textarea
  attributes:
    label: Debug Information
    description: |
      In your npminmin, click on the "?" menu (found to the right of "Window" in the menu bar).
      In the menu that drops down, choose "Debug Info...".
      A dialog will open detailing specifics about your npminmin version, plugins, etc.
      CLICK ON THE BUTTON "Copy debug info into clipboard".
      Do a PASTE HERE
    render: shell
  validations:
    required: true
- type: textarea
  attributes:
    label: Anything else?
    description: |
      Links? References? Anything that will give us more context about the issue you are encountering!

      Tip: You can attach images or relevant text files by clicking this area to highlight it and then dragging files in.
  validations:
    required: false
