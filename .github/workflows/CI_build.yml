   144|  build_windows:
   145|
   146|    runs-on: windows-latest
   147|    needs: before_build
   148|    if: needs.before_build.outputs.result == '' || needs.before_build.outputs.result == 'ONEJOB'
   149|    strategy:
   150|      fail-fast: false
   151|      matrix: ${{ fromJSON(needs.before_build.outputs.matrix) }}
   152|
   153|    steps:
   154|    - name: Checkout repo
   155|      uses: actions/checkout@v6
   156|
   157|    - name: Add msbuild to PATH
   158|      uses: microsoft/setup-msbuild@v2
   159|
   160|    - name: Modify resource.h N++ version to avoid confusion
   161|      working-directory: PowerEditor\src\
   162|      run: |
   163|           $content = Get-Content -Path 'resource.h'
   164|           $newContent = $content -replace 'TEXT\(\"Notepad\+\+ v.*\"\)', 'TEXT("npminmin GH_BUILD")'
   165|           $newContent | Set-Content -Path 'resource.h'
   166|
   167|    - name: MSBuild of n++ exe
   168|      working-directory: PowerEditor\visual.net\
   169|      run: msbuild notepadPlus.sln /m /p:configuration="${{ matrix.build_configuration }}" /p:platform="${{ matrix.build_platform }}" /p:PlatformToolset="v143"
   170|
   171|    - name: Archive artifacts for x64 / Release
   172|      if: matrix.build_platform == 'x64' && matrix.build_configuration == 'Release'
   173|      uses: actions/upload-artifact@v6
   174|      with:
   175|          name: npminmin.MSVC.${{ matrix.build_platform}}.${{ matrix.build_configuration}}
   176|          path: PowerEditor\bin64\npminmin.exe
   177|
   178|    - name: Archive artifacts for Win32 / Release
   179|      if: matrix.build_platform == 'Win32' && matrix.build_configuration == 'Release'
   180|      uses: actions/upload-artifact@v6
   181|      with:
   182|          name: npminmin.MSVC.${{ matrix.build_platform}}.${{ matrix.build_configuration}}
   183|          path: PowerEditor\bin\npminmin.exe
   184|
   185|    - name: Archive artifacts for ARM64 / Release
   186|      if: matrix.build_platform == 'ARM64' && matrix.build_configuration == 'Release'
   187|      uses: actions/upload-artifact@v6
   188|      with:
   189|          name: npminmin.MSVC.${{ matrix.build_platform}}.${{ matrix.build_configuration}}
   190|          path: PowerEditor\binarm64\npminmin.exe
   191|
   192|    - name: Archive artifacts for ARM64|x64 / Debug
   193|      if: (matrix.build_platform == 'ARM64' || matrix.build_platform == 'x64') && matrix.build_configuration == 'Debug'
   194|      uses: actions/upload-artifact@v6
   195|      with:
   196|          name: npminmin.MSVC.${{ matrix.build_platform}}.${{ matrix.build_configuration}}
   197|          path: PowerEditor\visual.net\${{ matrix.build_platform}}\${{ matrix.build_configuration}}\npminmin.exe
   198|
   199|    - name: Archive artifacts for Win32 / Debug
   200|      if: matrix.build_platform == 'Win32' && matrix.build_configuration == 'Debug'
   201|      uses: actions/upload-artifact@v6
   202|      with:
   203|          name: npminmin.MSVC.${{ matrix.build_platform}}.${{ matrix.build_configuration}}
   204|          path: PowerEditor\visual.net\${{ matrix.build_configuration}}\npminmin.exe
   205|
   206|    - name: (cache) Restore Python modules for Win32 / Debug
   207|      if: matrix.build_platform == 'Win32' && matrix.build_configuration == 'Debug' && env.PYTHON_ALLOW_CACHE == 'true' && contains(needs.before_build.outputs.title, '[force nopythoncache]') != true
   208|      uses: actions/cache/restore@v4
   209|      with:
   210|        path: ${{ env.PYTHON_DIR_CACHE }}
   211|        key: ${{ needs.before_build.outputs.python }}
   212|
   213|    - name: Run xml validation test for Win32 / Debug only
   214|      if: matrix.build_platform == 'Win32' && matrix.build_configuration == 'Debug'
   215|      working-directory: .\
   216|      run: |
   217|           if ($Env:PYTHON_ALLOW_CACHE -eq "true" -and $${{ !contains(needs.before_build.outputs.title, '[force nopythoncache]') }} -and (Test-Path -Path ${{ env.PYTHON_DIR_CACHE }})) {
   218|             $Env:PYTHONPATH = "${{ env.PYTHON_DIR_CACHE }}"
   219|           }
   220|           else {
   221|             python -m pip install requests rfc3987 pywin32 lxml
   222|           }
   223|           python PowerEditor\Test\xmlValidator\validator_xml.py
   224|
   225|
   226|    - name: Run FunctionList and UrlDetection Tests for Win32 / Debug only
   227|      if: matrix.build_platform == 'Win32' && matrix.build_configuration == 'Debug'
   228|      working-directory: .\
   229|      run: |
   230|           Copy-Item "PowerEditor\visual.net\Debug\npminmin.exe" -Destination "PowerEditor\bin"
   231|           Copy-Item "PowerEditor\src\langs.model.xml" -Destination "PowerEditor\bin"
   232|           Copy-Item "PowerEditor\src\stylers.model.xml" -Destination "PowerEditor\bin"
   233|           Copy-Item "PowerEditor\src\shortcuts.xml" -Destination "PowerEditor\bin"
   234|           Copy-Item "PowerEditor\src\contextMenu.xml" -Destination "PowerEditor\bin"
   235|           Copy-Item "PowerEditor\installer\functionList" -Destination "PowerEditor\bin" -Recurse
   236|
   237|           Copy-Item "PowerEditor\installer\filesForTesting\regexGlobalTest.xml" -Destination "PowerEditor\bin\functionList"
   238|           Copy-Item "PowerEditor\installer\filesForTesting\overrideMap.xml" -Destination "PowerEditor\bin\functionList"
   239|
   240|           cd .\PowerEditor\Test\FunctionList\
   241|           .\unitTestLauncher.ps1
   242|           if ($LastExitCode -ne 0) { $host.SetShouldExit($LastExitCode) }
   243|
   244|           cd ..\UrlDetection
   245|           .\verifyUrlDetection.ps1
