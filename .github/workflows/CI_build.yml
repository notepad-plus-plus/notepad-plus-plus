   331|  build_windows_msys2:
   332|
   333|    runs-on: windows-latest
   334|    needs: before_build
   335|    if: needs.before_build.outputs.result == ''
   336|    strategy:
   337|      fail-fast: false
   338|      matrix:
   339|        include:
   340|          - msys: MINGW32
   341|            env: i686
   342|            arch: i686
   343|            configuration: Release
   344|            compiler: gcc
   345|          - msys: MINGW32
   346|            env: i686
   347|            arch: i686
   348|            configuration: Debug
   349|            compiler: gcc
   350|          - msys: MINGW64
   351|            env: x86_64
   352|            arch: x86_64
   353|            configuration: Release
   354|            compiler: gcc
   355|          - msys: MINGW64
   356|            env: x86_64
   357|            arch: x86_64
   358|            configuration: Debug
   359|            compiler: gcc
   360|          - msys: CLANG64
   361|            env: clang-x86_64
   362|            arch: x86_64
   363|            configuration: Release
   364|            compiler: clang
   365|
   366|    name: ${{ matrix.msys }} - ${{ matrix.configuration }}
   367|
   368|    steps:
   369|    - name: Checkout repo
   370|      uses: actions/checkout@v6
   371|
   372|    - name: Modify resource.h N++ version to avoid confusion
   373|      working-directory: PowerEditor\src\
   374|      shell: pwsh
   375|      run: |
   376|           $content = Get-Content -Path 'resource.h'
   377|           $newContent = $content -replace 'TEXT\(\"Notepad\+\+ v.*\"\)', 'TEXT("npminmin GH_BUILD")'
   378|           $newContent | Set-Content -Path 'resource.h'
   379|
   380|    - name: Install and update MSYS2 tools
   381|      uses: msys2/setup-msys2@v2
   382|      with:
   383|        msystem: ${{ matrix.msys }}
   384|        install: mingw-w64-${{ matrix.env }}-${{ matrix.compiler }} mingw-w64-${{ matrix.env }}-make
   385|        update: true
   386|        release: false
   387|
   388|    - name: Make n++ exe
   389|      working-directory: .\
   390|      run: |
   391|        Write-host "${{ matrix.msys }}"
   392|        Write-host "${{ matrix.configuration }}"
   393|        $Env:MSYSTEM = '${{ matrix.msys }}'
   394|        $Env:Path = 'C:\msys64\usr\bin' + [IO.Path]::PathSeparator + $Env:Path
   395|        $Env:Path = 'C:\msys64\' + '${{ matrix.msys }}'.ToLower() + '\bin' + [IO.Path]::PathSeparator + $Env:Path
   396|        if ( $${{ matrix.configuration == 'Debug'}} ) {$Env:DEBUG = '1'}
   397|        Write-Output "Tools version:"
   398|        Write-Output (((${{ matrix.compiler }} --version) | select-object -first 1) + " " + (${{ matrix.compiler }} -dumpmachine))
   399|        Write-Output (mingw32-make --version) | select-object -first 1
   400|        Write-Output (sh --version) | select-object -first 1
   401|        mingw32-make -f PowerEditor\gcc\makefile
   402|
   403|    - name: Archive artifacts for ${{ matrix.msys }} / ${{ matrix.configuration }}
   404|      uses: actions/upload-artifact@v6
   405|      with:
   406|        name: npminmin.${{ matrix.compiler }}.${{ matrix.arch }}.${{ matrix.configuration }}
   407|        path: bin.${{ matrix.compiler }}.${{ matrix.arch }}${{ matrix.configuration == 'Debug' && '-debug' || '' }}\npminmin.exe
