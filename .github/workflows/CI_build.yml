     1|name: CI_build
     2|
     3|on: [push, pull_request]
     4|env:
     5|  PYTHON_ALLOW_CACHE: true
     6|  PYTHON_DIR_CACHE: D:\.cache\python
     7|
     8|jobs:
     9|  before_build:
    10|
    11|    runs-on: windows-latest
    12|    outputs:
    13|      result: ${{ steps.filter.outputs.result }}
    14|      matrix: ${{ steps.filter.outputs.matrix }}
    15|      title: ${{ steps.filter.outputs.title }}
    16|      python: ${{ steps.filter.outputs.python }}
    17|
    18|    steps:
    19|    - name: Checkout repo
    20|      uses: actions/checkout@v6
    21|      with:
    22|        fetch-depth: ${{ github.event_name == 'pull_request' && 2 || 0 }}
    23|
    24|    - name: Commit filtering
    25|      id: filter
    26|      run: |
    27|        $allowMaster = $true
    28|        $folders_onejob = "PowerEditor/(Test|(installer/(filesForTesting|functionList)))/"
    29|        $folders_nowork = "\.github/ISSUE_TEMPLATE"
    30|        $files_nowork = "md|txt|log|ini"
    31|        $files_needwork = "CMakeLists\.txt"
    32|
    33|        $matrix_all = 'matrix={"build_configuration": ["Release", "Debug"], "build_platform": ["x64", "Win32", "ARM64"]}'
    34|        $matrix_onejob = 'matrix={"build_configuration": ["Debug"], "build_platform": ["Win32"]}'
    35|        Write-Output $matrix_all >> $env:GITHUB_OUTPUT
    36|
    37|        $isPush = "${{github.event_name }}" -eq "push" ? $true : $false
    38|        $isMaster = $isPush -and $${{ github.ref_name == github.event.repository.master_branch }}
    39|
    40|        $commit_message = $isPush ? (git show -s --format=%B) : (git log -1 --no-merges --pretty=%B)
    41|        $commit_title = ($commit_message -split "[\r\n]+")[0]
    42|        Write-Output "title=$commit_title" >> $env:GITHUB_OUTPUT
    43|        $files_modified = @(git diff --name-only HEAD~1)
    44|        $files_needwork_all = @($files_modified | Where-Object {$_ -notmatch "\.(xml|$files_nowork)$|$folders_nowork|$folders_onejob" -or $_ -match "($files_needwork)$"})
    45|
    46|        if ($allowMaster -or !$isMaster) {
    47|            if ($commit_title -match "\[force all\]") {
    48|              Write-Output "Run standard jobs"
    49|            }
    50|            elseif ($commit_title -match "\[force one\]") {
    51|              Write-Output "Run only one Win32/Debug job"
    52|              Write-Output "result=ONEJOB" >> $env:GITHUB_OUTPUT
    53|              Write-Output $matrix_onejob >> $env:GITHUB_OUTPUT
    54|            }
    55|            elseif (($files_modified.length -gt 0 -and $files_needwork_all.length -eq 0) -or $commit_title -match "\[force (xml|none)\]") {
    56|                if (@($files_modified | Where-Object {$_ -notmatch "\.($files_nowork)$|$folders_nowork"}).length -eq 0 -or $commit_title -match "\[force none\]") {
    57|                    Write-Output "Changed files on this commit don't require any additional tasks.`n"
    58|                    Write-Output "result=OK" >> $env:GITHUB_OUTPUT
    59|                    Write-Output "PYTHON_ALLOW_CACHE=false" >> $env:GITHUB_ENV
    60|                    Exit
    61|                }
    62|                else {
    63|                    Write-Output "Run only XML validation step"
    64|                    if (@($files_modified | Where-Object {$_ -match $folders_onejob}).length -eq 0) {
    65|                        Write-Output "result=XML" >> $env:GITHUB_OUTPUT
    66|                    }
    67|                    else {
    68|                      Write-Output "Run only one Win32/Debug job"
    69|                      Write-Output "result=ONEJOB" >> $env:GITHUB_OUTPUT
    70|                      Write-Output $matrix_onejob >> $env:GITHUB_OUTPUT
    71|                    }
    72|
    73|                }
    74|            }
    75|            else {
    76|              Write-Output "Run standard jobs"
    77|            }
    78|        }
    79|        else {
    80|          Write-Output "Run standard jobs"
    81|        }
    82|
    83|        if ($commit_title -match "\[force nopythoncache\]") {
    84|          $env:PYTHON_ALLOW_CACHE = "false"
    85|          Write-Output "PYTHON_ALLOW_CACHE=false" >> $env:GITHUB_ENV
    86|        }
    87|        if ($Env:PYTHON_ALLOW_CACHE -eq "true") {
    88|          $python = ((python -V) -split " ")[1]
    89|          $requests = (Invoke-RestMethod https://pypi.org/pypi/requests/json).info.version
    90|          $rfc3987 = (Invoke-RestMethod https://pypi.org/pypi/rfc3987/json).info.version
    91|          $pywin32 = (Invoke-RestMethod https://pypi.org/pypi/pywin32/json).info.version
    92|          $lxml = (Invoke-RestMethod https://pypi.org/pypi/lxml/json).info.version
    93|          $key = "${{ runner.os }}-python_$python-requests_$requests-rfc3987_$rfc3987-pywin32_$pywin32-lxml_$lxml"
    94|          Write-Output "python=$key" >> $env:GITHUB_OUTPUT
    95|        }
    96|
    97|    - name: (cache) Lookup Python modules
    98|      if: env.PYTHON_ALLOW_CACHE == 'true'
    99|      uses: actions/cache/restore@v4
   100|      id: cache-lookup
   101|      with:
   102|        path: ${{ env.PYTHON_DIR_CACHE }}
   103|        key: ${{ steps.filter.outputs.python }}
   104|        lookup-only: true
   105|
   106|    - name: (cache) Restore Python modules
   107|      if: env.PYTHON_ALLOW_CACHE == 'true' && steps.filter.outputs.result == 'XML' && steps.cache-lookup.outputs.cache-hit == 'true'
   108|      uses: actions/cache/restore@v4
   109|      with:
   110|        path: ${{ env.PYTHON_DIR_CACHE }}
   111|        key: ${{ steps.filter.outputs.python }}
   112|
   113|    - name: (cache) Install Python modules
   114|      if: env.PYTHON_ALLOW_CACHE == 'true' && steps.cache-lookup.outputs.cache-hit != 'true'
   115|      run: |
   116|        python -m pip install --target ${{ env.PYTHON_DIR_CACHE }} requests rfc3987 pywin32 lxml
   117|
   118|    - name: (cache) Save Python modules
   119|      if: env.PYTHON_ALLOW_CACHE == 'true' && steps.cache-lookup.outputs.cache-hit != 'true' && github.event_name == 'push'
   120|      uses: actions/cache/save@v4
   121|      with:
   122|        path: ${{ env.PYTHON_DIR_CACHE }}
   123|        key: ${{ steps.filter.outputs.python }}
   124|
   125|    - name: XML validation
   126|      if: steps.filter.outputs.result == 'XML'
   127|      run: |
   128|        if ($Env:PYTHON_ALLOW_CACHE -eq "true" -and (Test-Path -Path ${{ env.PYTHON_DIR_CACHE }})) {
   129|          $Env:PYTHONPATH = "${{ env.PYTHON_DIR_CACHE }}"
   130|        }
   131|        else {
   132|          python -m pip install requests rfc3987 pywin32 lxml
   133|        }
   134|        python PowerEditor\Test\xmlValidator\validator_xml.py
   135|        if ($LastExitCode -eq 0) {
   136|            Write-Output "`nAll XML files are valid.`n"
   137|
   138|        }
   139|        else {
   140|            Write-Output "`nSome XML files are invalid.`n"
   141|            $host.SetShouldExit($LastExitCode)
   142|        }
